<script>
// === THREE.JS LAYER CLASS ===
/**
 * THREEJS_LAYER.js — Capa 3D para el Pipeline de Terror Visual
 * ==============================================================
 * Three.js como capa modular: se superpone al WebGL shader + SVG existente.
 * Geometrías 3D deformadas, partículas volumétricas, post-procesado,
 * control de cámara tipo "director de cine".
 *
 * Arquitectura:
 *   [WebGL Shader BG] → [Three.js Canvas 3D] → [SVG Entity] → [Canvas CRT] → [Canvas Particles] → [Subtítulos]
 *
 * Three.js NO reemplaza nada — AÑADE profundidad cuando el director lo pide.
 *
 * Uso:
 *   const layer3d = new ThreejsLayer(canvas, config);
 *   layer3d.update(t, intensidad);
 *   layer3d.dispose();
 */

class ThreejsLayer {
    constructor(canvas, config = {}) {
        this.canvas = canvas;
        this.config = Object.assign({
            // Geometría principal
            geometria: 'esfera',      // esfera, cubo, toro, octaedro, custom
            escala: 1.0,
            deformacion: 0.0,         // 0-1, cuánto se deforma
            wireframe: false,

            // Cámara
            camara: 'orbitar',        // orbitar, dolly, truck, tilt, estatica
            camara_velocidad: 0.5,
            camara_distancia: 4.0,
            fov: 75,

            // Iluminacion
            iluminacion: 'puntual',   // puntual, ambiental, spot, neon
            luz_color: '#ff0000',
            luz_intensidad: 1.0,
            sombras: false,

            // Partículas 3D
            particulas_3d: 0,         // 0 = desactivado, 50-500 partículas
            particulas_tamano: 0.08,
            particulas_velocidad: 0.3,

            // Post-procesado
            bloom: 0.0,              // 0-1, resplandor
            glitch_3d: 0.0,          // 0-1, distorsión 3D
            dof: 0.0,               // 0-1, profundidad de campo (blur)
            dof_foco: 2.0,          // distancia del foco

            // Comportamiento reactivo
            reactivo: true,          // reacciona al director intensity
            rotacion_automatica: true,

            // Paleta (hereda del shader si está disponible)
            color_base: '#ff0000',
        }, config);

        this.scene = null;
        this.camera = null;
        this.renderer = null;
        this.meshPrincipal = null;
        this.particulas = null;
        this.clock = null;
        this.init();
    }

    init() {
        // Scene
        this.scene = new THREE.Scene();
        this.scene.fog = new THREE.FogExp2(0x000000, 0.06);

        // Camera
        this.camera = new THREE.PerspectiveCamera(
            this.config.fov,
            this.canvas.width / this.canvas.height,
            0.1,
            100
        );
        this.camera.position.set(0, 0, this.config.camara_distancia);

        // Renderer
        this.renderer = new THREE.WebGLRenderer({
            canvas: this.canvas,
            alpha: true,         // transparente — se superpone al BG
            antialias: false,    // performance
        });
        this.renderer.setSize(this.canvas.width, this.canvas.height);
        this.renderer.setPixelRatio(1);  // forzar 1x para performance
        this.renderer.setClearColor(0x000000, 0); // transparente

        // Clock
        this.clock = new THREE.Clock();

        // Fondo oscuro semi-transparente para que los objetos 3D resalten
        const backdropGeo = new THREE.PlaneGeometry(50, 50);
        const backdropMat = new THREE.MeshBasicMaterial({
            color: 0x000000,
            transparent: true,
            opacity: 0.35,
            side: THREE.DoubleSide
        });
        this.backdrop = new THREE.Mesh(backdropGeo, backdropMat);
        this.backdrop.position.z = -5;
        this.scene.add(this.backdrop);

        // Luces
        this._crearLuces();

        // Geometría principal
        this._crearGeometria();

        // Partículas 3D (si están configuradas)
        if (this.config.particulas_3d > 0) {
            this._crearParticulas();
        }

        // Post-procesado simple (sin EffectComposer para mantenerlo ligero)
        this._initPostProcess();
    }

    _crearLuces() {
        const color = new THREE.Color(this.config.luz_color);
        const intensidad = this.config.luz_intensidad;

        // Ambiental siempre presente (bajo)
        const ambient = new THREE.AmbientLight(0x111111, 0.3);
        this.scene.add(ambient);

        if (this.config.iluminacion === 'puntual') {
            const light = new THREE.PointLight(color, intensidad, 20);
            light.position.set(2, 2, 3);
            this.scene.add(light);
            this.luzPrincipal = light;
        } else if (this.config.iluminacion === 'spot') {
            const light = new THREE.SpotLight(color, intensidad);
            light.position.set(0, 5, 5);
            light.angle = Math.PI / 6;
            light.penumbra = 0.5;
            this.scene.add(light);
            this.luzPrincipal = light;
        } else if (this.config.iluminacion === 'neon') {
            // Múltiples luces de colores para efecto neón
            const colors = [0xff0044, 0x0044ff, 0x00ff44];
            colors.forEach((c, i) => {
                const l = new THREE.PointLight(c, 0.6, 15);
                l.position.set(
                    Math.cos(i * 2.094) * 3,
                    Math.sin(i * 1.5) * 2,
                    Math.sin(i * 2.094) * 3
                );
                this.scene.add(l);
            });
            this.luzPrincipal = null;
        }
        // 'ambiental' solo tiene la ambiental
    }

    _crearGeometria() {
        let geometry;
        const geo = this.config.geometria;

        if (geo === 'esfera') {
            geometry = new THREE.SphereGeometry(1, 32, 32);
        } else if (geo === 'cubo') {
            geometry = new THREE.BoxGeometry(1.5, 1.5, 1.5, 8, 8, 8); // subdivisions para deformar
        } else if (geo === 'toro') {
            geometry = new THREE.TorusGeometry(1, 0.3, 16, 32);
        } else if (geo === 'octaedro') {
            geometry = new THREE.OctahedronGeometry(1, 2);
        } else if (geo === 'custom') {
            // Geometría compuesta: esfera con tentáculos
            geometry = new this._geometriaMonstruo();
        } else {
            geometry = new THREE.SphereGeometry(1, 16, 16);
        }

        const material = new THREE.MeshPhongMaterial({
            color: new THREE.Color(this.config.color_base),
            wireframe: this.config.wireframe,
            transparent: true,
            opacity: 0.85,
            shininess: 100,
            emissive: new THREE.Color(this.config.color_base),
            emissiveIntensity: 0.6,
        });

        this.meshPrincipal = new THREE.Mesh(geometry, material);
        this.meshPrincipal.scale.setScalar(this.config.escala);
        this.scene.add(this.meshPrincipal);

        // Guardar posiciones originales para deformación
        this.posicionesOriginales = geometry.attributes.position.array.slice();
    }

    _geometriaMonstruo() {
        // Geometría procedural: esfera con protuberancias
        const geo = new THREE.SphereGeometry(1, 24, 24);
        const pos = geo.attributes.position;
        for (let i = 0; i < pos.count; i++) {
            const x = pos.getX(i);
            const y = pos.getY(i);
            const z = pos.getZ(i);
            const n = Math.sin(x * 3) * Math.cos(y * 4) * 0.2;
            pos.setX(i, x + x * n);
            pos.setY(i, y + y * n);
            pos.setZ(i, z + z * n);
        }
        geo.computeVertexNormals();
        return geo;
    }

    _crearParticulas() {
        const count = this.config.particulas_3d;
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(count * 3);
        const velocities = new Float32Array(count * 3);
        const sizes = new Float32Array(count);

        for (let i = 0; i < count; i++) {
            // Esfera distribuida
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            const r = 2 + Math.random() * 3;

            positions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
            positions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
            positions[i * 3 + 2] = r * Math.cos(phi);

            velocities[i * 3] = (Math.random() - 0.5) * 0.01;
            velocities[i * 3 + 1] = (Math.random() - 0.5) * 0.01;
            velocities[i * 3 + 2] = (Math.random() - 0.5) * 0.01;

            sizes[i] = this.config.particulas_tamano * (0.5 + Math.random());
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('aSize', new THREE.BufferAttribute(sizes, 1));

        this.velocidadesParticulas = velocities;

        const material = new THREE.PointsMaterial({
            color: new THREE.Color(this.config.color_base),
            size: this.config.particulas_tamano,
            transparent: true,
            opacity: 0.6,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
        });

        this.particulas = new THREE.Points(geometry, material);
        this.scene.add(this.particulas);
    }

    _initPostProcess() {
        // Bloom fake: emissive más fuerte en objetos bright
        // Se logra ajustando emissiveIntensity en update()
        this.postProcess = {
            bloomBase: this.config.bloom,
            glitchBase: this.config.glitch_3d,
            dofBase: this.config.dof,
        };
    }

    // ============================================================
    //  UPDATE — llamado cada frame desde el orquestador
    // ============================================================
    update(t, intensidad = 0.5) {
        if (!this.renderer) return;

        const intensidadFinal = this.config.reactivo ? intensidad : 0.5;

        // --- Cámara ---
        this._updateCamara(t, intensidadFinal);

        // --- Geometría ---
        this._updateGeometria(t, intensidadFinal);

        // --- Partículas ---
        if (this.particulas) {
            this._updateParticulas(t, intensidadFinal);
        }

        // --- Luces ---
        this._updateLuces(t, intensidadFinal);

        // --- Post-procesado ---
        this._updatePostProcess(intensidadFinal);

        // --- Render ---
        this.renderer.render(this.scene, this.camera);
    }

    _updateCamara(t, intensidad) {
        const vel = this.config.camara_velocidad;
        const dist = this.config.camara_distancia;

        if (this.config.camara === 'orbitar') {
            this.camera.position.x = Math.cos(t * vel) * dist;
            this.camera.position.z = Math.sin(t * vel) * dist;
            this.camera.position.y = Math.sin(t * vel * 0.5) * 1.5;
            this.camera.lookAt(0, 0, 0);
        } else if (this.config.camara === 'dolly') {
            // Avanza y retrocede (zoom physical)
            const dollyZ = dist + Math.sin(t * vel * 0.7) * 2;
            this.camera.position.z = dollyZ;
            this.camera.position.x = Math.sin(t * vel * 0.3) * 0.5;
            this.camera.lookAt(0, 0, 0);
        } else if (this.config.camara === 'truck') {
            // Movimiento lateral
            this.camera.position.x = Math.sin(t * vel) * dist * 0.8;
            this.camera.position.z = dist;
            this.camera.position.y = 1 + Math.sin(t * vel * 0.4) * 0.5;
            this.camera.lookAt(0, 0, 0);
        } else if (this.config.camara === 'tilt') {
            // Ángulo inclinado (dutch angle)
            this.camera.position.set(0, 0, dist);
            this.camera.rotation.z = Math.sin(t * vel * 0.3) * 0.3;
            this.camera.lookAt(0, 0, 0);
        }
        // 'estatica' no mueve la cámara
    }

    _updateGeometria(t, intensidad) {
        if (!this.meshPrincipal) return;

        const geo = this.meshPrincipal.geometry;
        const pos = geo.attributes.position;
        const deform = this.config.deformacion * intensidad;

        if (deform > 0 && this.posicionesOriginales) {
            // Deformación orgánica basada en ruido
            for (let i = 0; i < pos.count; i++) {
                const ox = this.posicionesOriginales[i * 3];
                const oy = this.posicionesOriginales[i * 3 + 1];
                const oz = this.posicionesOriginales[i * 3 + 2];

                // Ruido simplex-like (pseudo-random but smooth)
                const nx = Math.sin(ox * 3.0 + t * 2.0) * Math.cos(oy * 2.5 + t * 1.5);
                const ny = Math.cos(oy * 3.0 + t * 1.8) * Math.sin(oz * 2.0 + t * 2.2);
                const nz = Math.sin(oz * 2.5 + t * 1.3) * Math.cos(ox * 3.0 + t * 0.7);

                pos.setX(i, ox + nx * deform * 0.3);
                pos.setY(i, oy + ny * deform * 0.3);
                pos.setZ(i, oz + nz * deform * 0.3);
            }
            pos.needsUpdate = true;
            geo.computeVertexNormals();
        }

        // Rotación
        if (this.config.rotacion_automatica) {
            this.meshPrincipal.rotation.x = t * 0.3 * intensidad;
            this.meshPrincipal.rotation.y = t * 0.5 * intensidad;
        }

        // Escala pulsante (reactiva)
        const pulso = 1.0 + Math.sin(t * 3.0) * 0.1 * intensidad;
        this.meshPrincipal.scale.setScalar(this.config.escala * pulso);
    }

    _updateParticulas(t, intensidad) {
        if (!this.particulas) return;

        const pos = this.particulas.geometry.attributes.position;
        const vel = this.velocidadesParticulas;
        const velMult = this.config.particulas_velocidad * (0.5 + intensidad);

        for (let i = 0; i < pos.count; i++) {
            let x = pos.getX(i) + vel[i * 3] * velMult;
            let y = pos.getY(i) + vel[i * 3 + 1] * velMult;
            let z = pos.getZ(i) + vel[i * 3 + 2] * velMult;

            // wrapping — si se alejan mucho, reaparecen cerca
            const dist = Math.sqrt(x * x + y * y + z * z);
            if (dist > 6) {
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                const r = 2 + Math.random() * 2;
                x = r * Math.sin(phi) * Math.cos(theta);
                y = r * Math.sin(phi) * Math.sin(theta);
                z = r * Math.cos(phi);
            }

            pos.setXYZ(i, x, y, z);
        }
        pos.needsUpdate = true;

        // Opacidad reactiva
        this.particulas.material.opacity = 0.3 + intensidad * 0.5;
    }

    _updateLuces(t, intensidad) {
        if (this.luzPrincipal) {
            // Pulsación de la luz principal
            this.luzPrincipal.intensity = this.config.luz_intensidad *
                (0.7 + Math.sin(t * 2.0) * 0.3 * intensidad);

            // Movimiento sutil de la luz
            this.luzPrincipal.position.x = 2 + Math.sin(t * 0.5) * 1;
            this.luzPrincipal.position.y = 2 + Math.cos(t * 0.7) * 0.5;
        }
    }

    _updatePostProcess(intensidad) {
        // Bloom: ajustar emissiveIntensity
        if (this.meshPrincipal && this.postProcess.bloomBase > 0) {
            this.meshPrincipal.material.emissiveIntensity =
                0.15 + intensidad * this.postProcess.bloomBase * 0.8;
        }

        // Glitch 3D: distorsionar la geometría más fuerte
        if (this.postProcess.glitchBase > 0 && this.config.deformacion > 0) {
            // Ya se maneja en _updateGeometria con intensidad
        }

        // DOF: cambiar near/far de la cámara (simulado)
        if (this.postProcess.dofBase > 0) {
            const blurFactor = this.postProcess.dofBase * intensidad;
            this.camera.near = 0.1 + blurFactor * 0.5;
            this.camera.far = 100 - blurFactor * 30;
            this.camera.updateProjectionMatrix();
        }
    }

    // ============================================================
    //  RESIZE
    // ============================================================
    resize(w, h) {
        this.canvas.width = w;
        this.canvas.height = h;
        this.renderer.setSize(w, h);
        this.camera.aspect = w / h;
        this.camera.updateProjectionMatrix();
    }

    // ============================================================
    //  CLEANUP
    // ============================================================
    dispose() {
        if (this.renderer) {
            this.renderer.dispose();
            this.renderer = null;
        }
        if (this.scene) {
            this.scene.traverse(obj => {
                if (obj.geometry) obj.geometry.dispose();
                if (obj.material) obj.material.dispose();
            });
        }
    }
}

/**
 * Genera el código JavaScript que inicializa Three.js dentro de un HTML.
 * Se inyecta como script adicional al template del orquestador.
 */
function generarThreejsSnippet(config) {
    const preset = config.preset ? THREEJS_PRESETS[config.nivel]?.[config.preset] : null;
    const cfg = preset ? Object.assign({}, preset, configoverride || {}) : config;

    return `
    <!-- THREE.JS LAYER -->
    <canvas id="canvas3d" style="
        position: absolute; top: 0; left: 0;
        width: 100%; height: 100%;
        z-index: 2;
        pointer-events: none;
    "></canvas>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"><\/script>
    <script>
    (function() {
        const canvas3d = document.getElementById('canvas3d');
        canvas3d.width = window.innerWidth;
        canvas3d.height = window.innerHeight;

        const cfg3d = ${JSON.stringify(cfg, null, 2)};

        // Esperar a que Three.js esté disponible
        if (typeof THREE === 'undefined') {
            console.warn('Three.js no cargado — capa 3D desactivada');
            return;
        }

        const layer3d = new ThreejsLayer(canvas3d, cfg3d);

        // Hook al loop principal del orquestador
        const _origUpdate = window.update;
        if (_origUpdate) {
            window.update = function(t, intensidad) {
                _origUpdate(t, intensidad);
                layer3d.update(t, intensidad);
            };
        } else {
            // Fallback: loop independiente
            function loop3d() {
                const t = (performance.now() / 1000) % 12;
                layer3d.update(t, 0.5);
                requestAnimationFrame(loop3d);
            }
            loop3d();
        }

        // Resize
        window.addEventListener('resize', () => {
            layer3d.resize(window.innerWidth, window.innerHeight);
        });

        // Exponer para debug
        window._layer3d = layer3d;
    })();
    <\/script>`;
}

const DIRECTOR_CURVA = [
    [0.0,  0.1],   // Inicio: calma
    [2.0,  0.3],   // Primer susurro: leve tensión
    [4.0,  0.2],   // Pausa breve

    [7.5,  0.9],   // Pico de caos

];

function getDirectorIntensity(t) {
    // Interpolar entre puntos clave
    for (let i = 0; i < DIRECTOR_CURVA.length - 1; i++) {
        const [t0, v0] = DIRECTOR_CURVA[i];
        const [t1, v1] = DIRECTOR_CURVA[i + 1];
        if (t >= t0 && t <= t1) {
            const ratio = (t - t0) / (t1 - t0);
            return v0 + (v1 - v0) * ratio;
        }
    }
    return 0.1;
}

class Particula {
    constructor(w, h) { this.reset(w, h, true); }
    reset(w, h, init) {
        this.x = Math.random() * w;
        this.y = init ? Math.random() * h : -10;
        this.vx = (Math.random() - 0.5) * 0.5;
        this.vy = 0.2 + Math.random() * 0.8;
        this.size = 0.5 + Math.random() * 2.5;
        this.opacity = 0.1 + Math.random() * 0.4;
        this.life = 0;
        this.maxLife = 200 + Math.random() * 300;
    }
    update(w, h, intensidad) {
        this.life++;
        this.x += this.vx + Math.sin(this.life * 0.02) * 0.3;
        this.y += this.vy * (0.5 + intensidad);
        this.opacity = Math.min(this.opacity, (1 - this.life / this.maxLife) * 0.5);
        if (this.y > h || this.life > this.maxLife) this.reset(w, h, false);
    }
    draw(ctx) {
        ctx.fillStyle = 'rgba(255,255,255,' + this.opacity + ')';
        ctx.fillRect(this.x, this.y, this.size, this.size);
    }
}

    for (let i = 0; i < subtitulos.length; i++) {

            escenaActual = i;
            break;

    // Si cambió la escena, activar transición
    if (escenaActual !== escenaAnterior && escenaActual !== -1 && escenaAnterior !== -1) {
        transicionActiva = true;
        // Glitch-cut: flash rápido + distorsión
        transicionFade.style.opacity = '0.8';
        setTimeout(() => { transicionFade.style.opacity = '0'; transicionActiva = false; }, 150);
    }
    escenaAnterior = escenaActual;
    return transicionActiva;
}

function initAudioReactive() {
    if (audioContext) return;
    try {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        analyzer = audioContext.createAnalyser();
        analyzer.fftSize = 256;
        dataArray = new Uint8Array(analyzer.frequencyBinCount);
        if (audioP) {
            const source = audioContext.createMediaElementSource(audioP);
            source.connect(analyzer);
            analyzer.connect(audioContext.destination);
        }
    } catch(e) { /* Web Audio no soportado */ }
}

function getAudioRMS() {
    if (!analyzer || !dataArray) return 0;
    analyzer.getByteFrequencyData(dataArray);
    let sum = 0;
    for (let i = 0; i < dataArray.length; i++) sum += dataArray[i];
    return sum / (dataArray.length * 255); // Normalizado 0-1
}

        const caosExtra = intensidadFinal * 0.5;
        valorZoom = 0.4 + Math.random() * 0.2 + caosExtra * 0.3;
        filtroDesplazamiento.setAttribute('scale', Math.random() * 160 * intensidadFinal + 40);
        const gx = mov.x + (Math.random() - 0.5) * 80 * intensidadFinal;
        const gy = mov.y + (Math.random() - 0.5) * 80 * intensidadFinal;
        entidad.setAttribute('transform',
            'translate(' + (400 + gx) + ', ' + (400 + gy) + ') ' +
            'scale(' + (mov.sx + Math.random() * 0.3 * intensidadFinal) + ') ' +
            'skewX(' + ((Math.random() - 0.5) * 50 * intensidadFinal) + ') ' +
            'rotate(' + (mov.rot + (Math.random() - 0.5) * 30 * intensidadFinal) + ')');
        // Scanlines más densos
        ctx.fillStyle = "rgba(255, 255, 255, 0.3)";
        for (let i = 0; i < 20 * intensidadFinal; i++) {
            ctx.fillRect(0, Math.random() * canvasEstatica.height, canvasEstatica.width, Math.random() * 25);
        }
        ctx.fillStyle = 'rgba(' + (Math.random()*255|0) + ', 0, 0, ' + (0.15 * intensidadFinal) + ')';
        ctx.fillRect(0, Math.random() * canvasEstatica.height, canvasEstatica.width, Math.random() * 80);
        if (audioS) audioS.volume = 0.3 + intensidadFinal * 0.4;
        if (audioP) audioP.volume = 0.7 - intensidadFinal * 0.4;
    } else {
        // === MODO CALMA (director bajo) ===
        valorZoom += (1.0 - valorZoom) * 0.12;
        filtroDesplazamiento.setAttribute('scale', Math.sin(t * 8) * (4 + intensidadFinal * 10));
        entidad.setAttribute('transform',
            'translate(' + cx + ', ' + cy + ') ' +
            'scale(' + mov.sx + ', ' + mov.sy + ') ' +
            'rotate(' + mov.rot + ')');
        if (Math.random() > 0.96) {
            ctx.fillStyle = "rgba(255, 255, 255, 0.1)";
            ctx.fillRect(0, Math.random() * canvasEstatica.height, canvasEstatica.width, 12);
        }
        if (audioS) audioS.volume = 0.3;
        if (audioP) audioP.volume = 0.7;
    }

    // === PARALLAX: capas额外 a diferentes velocidades ===
    if (PARALLAX && mezclaBg && mezclaFg) {
        const movBg = mezclaBg(t * PARALLAX.bg.speed, PARALLAX.bg.dna.params1, PARALLAX.bg.dna.params2);
        const movFg = mezclaFg(t * PARALLAX.fg.speed, PARALLAX.fg.dna.params1, PARALLAX.fg.dna.params2);
        const bgScale = PARALLAX.bg.scale;
        const fgScale = PARALLAX.fg.scale;
        parallaxBg.setAttribute('transform',
            'translate(' + (400 + movBg.x * movScale * 0.5) + ', ' + (400 + movBg.y * movScale * 0.5) + ') ' +
            'scale(' + bgScale + ')');
        parallaxFg.setAttribute('transform',
            'translate(' + (400 + movFg.x * movScale * 1.5) + ', ' + (400 + movFg.y * movScale * 1.5) + ') ' +
            'scale(' + fgScale + ')');
        // Parallax reacciona al glitch
        if (kaosActivo || intensidadFinal > 0.7) {
            const jitter = intensidadFinal * 20;
            parallaxBg.setAttribute('transform',
                'translate(' + (400 + movBg.x + (Math.random()-0.5)*jitter) + ', ' + (400 + movBg.y + (Math.random()-0.5)*jitter) + ') ' +
                'scale(' + bgScale + ') rotate(' + ((Math.random()-0.5)*10) + ')');
            parallaxFg.setAttribute('transform',
                'translate(' + (400 + movFg.x + (Math.random()-0.5)*jitter*2) + ', ' + (400 + movFg.y + (Math.random()-0.5)*jitter*2) + ') ' +
                'scale(' + fgScale + ') rotate(' + ((Math.random()-0.5)*15) + ')');
        }
    }

    // === SHADER (modulado por intensidad + audio) ===
    gl.uniform2f(resLoc, canvasFondo.width, canvasFondo.height);
    gl.uniform1f(timeLoc, t);
    gl.uniform1f(zoomLoc, valorZoom + audioRMS * 0.5); // Audio amplifica zoom
    gl.drawArrays(gl.TRIANGLES, 0, 6);

    // === CRT SCANLINES ===
    ctx.fillStyle = "rgba(0, 0, 0, 0.06)";
    for (let y = 0; y < canvasEstatica.height; y += 5) {
        ctx.fillRect(0, y + (tiempo * 0.08 % 5), canvasEstatica.width, 2);
    }

    // === VIÑETA (modulada por director) ===
    let grad = ctx.createRadialGradient(
        canvasEstatica.width/2, canvasEstatica.height/2, canvasEstatica.width * 0.3,
        canvasEstatica.width/2, canvasEstatica.height/2, canvasEstatica.width * 0.7
    );
    grad.addColorStop(0, 'rgba(0,0,0,0)');
    grad.addColorStop(1, 'rgba(0,0,0,' + (0.3 + intensidadFinal * 0.3) + ')');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, canvasEstatica.width, canvasEstatica.height);

    requestAnimationFrame(animar);
}
requestAnimationFrame(animar);

window.onresize = function() {
    canvasFondo.width = window.innerWidth; canvasFondo.height = window.innerHeight;
    gl.viewport(0, 0, canvasFondo.width, canvasFondo.height);
    canvasEstatica.width = window.innerWidth; canvasEstatica.height = window.innerHeight;
    canvasParticulas.width = window.innerWidth; canvasParticulas.height = window.innerHeight;
    const c3d = document.getElementById('canvas3d');
    if (c3d) { c3d.width = window.innerWidth; c3d.height = window.innerHeight; }
    if (layer3d) layer3d.resize(window.innerWidth, window.innerHeight);
};
</script>
